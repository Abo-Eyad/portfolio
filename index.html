document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;

    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

5s}\n\n/* ---------- responsive ---------- */\n@media (max-width:960px){\n  .hero{grid-template-columns:1fr;text-align:left;gap:60px;padding-top:130px}\n  .hero-right{margin-top:0}\n  .skills-grid{grid-template-columns:1fr}\n  .proj-grid{grid-template-columns:1fr 1fr}\n  .tools-grid{grid-template-columns:1fr}\n  .two-col{grid-template-columns:1fr;gap:48px}\n  .contact-grid{grid-template-columns:1fr;gap:40px}\n}\n@media (max-width:680px){\n  section{padding:90px 0}\n  .edu-grid{grid-template-columns:1fr}\n  .proj-grid{grid-template-columns:1fr}\n  .job:hover,.crow:hover{transform:none}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- loader -->\n<div id=\"loader\">\n  <div class=\"load-init\">AW<\u002Fdiv>\n  <div class=\"load-bar\"><div class=\"load-fill\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"load-label\">Loading Portfolio<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- overlays -->\n<div class=\"noise\"><\u002Fdiv>\n<canvas id=\"particles\"><\u002Fcanvas>\n<div class=\"cur-ring\"><\u002Fdiv>\n<div class=\"cur-dot\"><\u002Fdiv>\n\n<!-- nav -->\n<nav>\n  <a href=\"#top\" class=\"logo\">Ahmed<span>.<\u002Fspan>Wahab<\u002Fa>\n  <div class=\"nav-links\" id=\"navlinks\">\n    <a href=\"#about\">About<\u002Fa>\n    <a href=\"#skills\">Skills<\u002Fa>\n    <a href=\"#tools\">Tools<\u002Fa>\n    <a href=\"#experience\">Experience<\u002Fa>\n    <a href=\"#projects\">Projects<\u002Fa>\n    <a href=\"#education\">Education<\u002Fa>\n    <a href=\"https://drive.google.com/file/d/15NqYBNMywG6jDcqvsbFDw_AWxRt00oR0/view\" target=\"_blank\" rel=\"noopener\">CV<\u002Fa>\n    <a href=\"#contact\" class=\"nav-cta\">Contact<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"burger\" id=\"burger\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n<\u002Fnav>\n\n<div class=\"wrap\">\n\n<!-- hero -->\n<header class=\"hero\" id=\"top\">\n  <div class=\"hero-left\">\n    <span class=\"avail reveal\"><span class=\"dot-live\"><\u002Fspan>Available for BIM Leadership &amp; Automation Roles<\u002Fspan>\n    <h1 class=\"reveal\" data-delay=\"1\">Ahmed <span class=\"shimmer\">Wahab<\u002Fspan><\u002Fh1>\n    <div class=\"role reveal\" data-delay=\"2\">Senior BIM Lead · Infrastructure Automation · C#/.NET 8 Developer<\u002Fdiv>\n    <p class=\"lede reveal\" data-delay=\"3\">Over a decade delivering wet, dry &amp; ICT utility networks for landmark mega-projects across KSA, the UAE &amp; Egypt — now pairing deep BIM design authority with custom C#/.NET 8 plugins and multi-agent AI workflows that automate the engineering itself.<\u002Fp>\n    <div class=\"cta-row reveal\" data-delay=\"4\">\n      <a href=\"#contact\" class=\"btn btn-primary\">Get in touch →<\u002Fa>\n      <a href=\"#tools\" class=\"btn btn-ghost\">View my tools<\u002Fa>\n      <a href=\"https://drive.google.com/file/d/15NqYBNMywG6jDcqvsbFDw_AWxRt00oR0/view\" target=\"_blank\" rel=\"noopener\" class=\"btn btn-ghost\">View CV ↗<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hero-right reveal right\" data-delay=\"2\">\n    <div class=\"orb\"><\u002Fdiv>\n    <div class=\"card3d\">\n      <div class=\"avatar-wrap\">\n        <div class=\"dash-ring\"><\u002Fdiv>\n        <div class=\"avatar\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c-name\">Ahmed Wahab<\u002Fdiv>\n      <div class=\"c-role\">Senior BIM Lead &amp; Automation Expert<\u002Fdiv>\n      <div class=\"c-stats\">\n        <div class=\"c-stat\"><b>10+<\u002Fb><small>Years Exp.<\u002Fsmall><\u002Fdiv>\n        <div class=\"c-stat\"><b>4<\u002Fb><small>Custom Tools<\u002Fsmall><\u002Fdiv>\n        <div class=\"c-stat\"><b>3<\u002Fb><small>Countries<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- about / summary -->\n<section id=\"about\">\n  <div class=\"eyebrow reveal\">Profile<\u002Fdiv>\n  <h2 class=\"sec-title reveal\" data-delay=\"1\">Engineering the networks —<br>and the tools that build them.<\u002Fh2>\n  <p class=\"sec-sub reveal\" data-delay=\"2\" style=\"max-width:780px;font-size:18px;line-height:1.7\">Senior BIM Lead and Infrastructure Automation Expert with over a decade delivering wet, dry &amp; ICT utility networks for landmark mega-projects across KSA, the UAE &amp; Egypt — King Abdel-Aziz Park, Qiddiya City and Shura Island among them. I pair deep hydraulic and BIM design authority (SewerGEMS, WaterGEMS, InfoWorks ICM, Civil 3D) with hands-on software engineering, architecting custom C#/.NET 8 plugins that automate pressure-network catalogs, clash management and drawing recovery — and pioneering multi-agent AI workflows that compress complex engineering tasks. ALX AI Career Essentials graduate, curriculum author and technical content creator with 3,500+ followers.<\u002Fp>\n<\u002Fsection>\n\n<!-- skills -->\n<section id=\"skills\">\n  <div class=\"eyebrow reveal\">Capabilities<\u002Fdiv>\n  <h2 class=\"sec-title reveal\" data-delay=\"1\">Skills &amp; Expertise<\u002Fh2>\n  <p class=\"sec-sub reveal\" data-delay=\"2\">Software engineering, hydraulic modeling, multidisciplinary BIM coordination, and the AI orchestration that ties it all together.<\u002Fp>\n  <div class=\"skills-grid\" id=\"skillsGrid\">\n    <div class=\"skill reveal\"><div class=\"skill-top\"><span>Autodesk Civil 3D &amp; AutoCAD<\u002Fspan><span>95%<\u002Fspan><\u002Fdiv><div class=\"bar\"><i data-w=\"95\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"skill reveal right\"><div class=\"skill-top\"><span>Bentley SewerGEMS &amp; WaterGEMS<\u002Fspan><span>92%<\u002Fspan><\u002Fdiv><div class=\"bar\"><i class=\"alt\" data-w=\"92\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"skill reveal\"><div class=\"skill-top\"><span>C# / .NET 8 Plugin Development<\u002Fspan><span>90%<\u002Fspan><\u002Fdiv><div class=\"bar\"><i data-w=\"90\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"skill reveal right\"><div class=\"skill-top\"><span>BIM Coordination &amp; Clash Detection<\u002Fspan><span>90%<\u002Fspan><\u002Fdiv><div class=\"bar\"><i class=\"alt\" data-w=\"90\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"skill reveal\"><div class=\"skill-top\"><span>Civil 3D &amp; AutoCAD .NET API<\u002Fspan><span>88%<\u002Fspan><\u002Fdiv><div class=\"bar\"><i data-w=\"88\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"skill reveal right\"><div class=\"skill-top\"><span>Inventor &amp; Infrastructure Parts Editor<\u002Fspan><span>88%<\u002Fspan><\u002Fdiv><div class=\"bar\"><i class=\"alt\" data-w=\"88\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"skill reveal\"><div class=\"skill-top\"><span>Multi-Agent AI Workflows<\u002Fspan><span>85%<\u002Fspan><\u002Fdiv><div class=\"bar\"><i data-w=\"85\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"skill reveal right\"><div class=\"skill-top\"><span>Revit &amp; Navisworks Manage<\u002Fspan><span>85%<\u002Fspan><\u002Fdiv><div class=\"bar\"><i class=\"alt\" data-w=\"85\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"skill reveal\"><div class=\"skill-top\"><span>Python &amp; Dynamo Automation<\u002Fspan><span>82%<\u002Fspan><\u002Fdiv><div class=\"bar\"><i data-w=\"82\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"skill reveal right\"><div class=\"skill-top\"><span>InfoWorks ICM<\u002Fspan><span>80%<\u002Fspan><\u002Fdiv><div class=\"bar\"><i class=\"alt\" data-w=\"80\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"chips-title reveal\">Technologies &amp; Tools<\u002Fdiv>\n  <div class=\"chips\">\n    <span class=\"chip\">C# / .NET 8<\u002Fspan><span class=\"chip\">Civil 3D .NET API<\u002Fspan><span class=\"chip\">AutoCAD .NET API<\u002Fspan><span class=\"chip\">WPF<\u002Fspan><span class=\"chip\">AppBundle / NETLOAD<\u002Fspan><span class=\"chip\">Python<\u002Fspan><span class=\"chip\">Dynamo<\u002Fspan><span class=\"chip\">Git<\u002Fspan><span class=\"chip\">Claude Code<\u002Fspan><span class=\"chip\">Antigravity CLI<\u002Fspan><span class=\"chip\">Generative AI<\u002Fspan><span class=\"chip\">Prompt Engineering<\u002Fspan><span class=\"chip\">Civil 3D<\u002Fspan><span class=\"chip\">AutoCAD<\u002Fspan><span class=\"chip\">Revit<\u002Fspan><span class=\"chip\">Navisworks Manage<\u002Fspan><span class=\"chip\">Inventor Professional<\u002Fspan><span class=\"chip\">Infrastructure Parts Editor<\u002Fspan><span class=\"chip\">WaterGEMS<\u002Fspan><span class=\"chip\">SewerGEMS<\u002Fspan><span class=\"chip\">InfoWorks ICM<\u002Fspan><span class=\"chip\">MS Office Suite<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- experience -->\n<section id=\"experience\">\n  <div class=\"eyebrow reveal\">Career<\u002Fdiv>\n  <h2 class=\"sec-title reveal\" data-delay=\"1\">Work Experience<\u002Fh2>\n  <p class=\"sec-sub reveal\" data-delay=\"2\">Over ten years across consultancy, contracting and site — from resort construction to BIM team leadership on regional mega-projects.<\u002Fp>\n  <div class=\"timeline\">\n    <div class=\"tl-item reveal left\">\n      <div class=\"job\">\n        <div class=\"job-head\"><h3>Senior BIM Lead — Wet Utilities &amp; Infrastructure Automation<\u002Fh3><span class=\"when\">Jan 2025 — Present<\u002Fspan><\u002Fdiv>\n        <div class=\"co\">Smart Engineering Consultancy<\u002Fdiv>\n        <div class=\"loc\">Cairo, Egypt · King Abdel-Aziz Park (KSA) · Qiddiya City (KSA) · WS09 Odour Control (UAE) · Tanajib Residential Camp (KSA)<\u002Fdiv>\n        <p>Lead BIM design and multidisciplinary coordination of wet, dry &amp; ICT networks for mega-projects, while developing and deploying custom C#/.NET 8 Civil 3D plugins — ClashDash &amp; PortForge — that automate Navisworks clash-report integration and pressure-network catalog generation. Architect parametric pressure &amp; gravity networks from raw DWG files, orchestrate multi-agent AI workflows (Claude Code + Antigravity CLI), and enforce SBC, SAES, NEOM, RSG &amp; EN 124 compliance with stage-based LOD 100–500 deliverables and full QA/QC clash resolution.<\u002Fp>\n        <div class=\"badges\"><span class=\"badge\">C# / .NET 8<\u002Fspan><span class=\"badge\">ClashDash<\u002Fspan><span class=\"badge\">PortForge<\u002Fspan><span class=\"badge\">AI Workflows<\u002Fspan><span class=\"badge\">LOD 100–500<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item reveal left\">\n      <div class=\"job\">\n        <div class=\"job-head\"><h3>Senior Infrastructure BIM Modular Engineer<\u002Fh3><span class=\"when\">Apr 2024 — Jan 2025<\u002Fspan><\u002Fdiv>\n        <div class=\"co\">El-Dafe Trading &amp; Contracting<\u002Fdiv>\n        <div class=\"loc\">Cairo, Egypt · Shura Island Hotel West 02/03/04 — Red Sea Global<\u002Fdiv>\n        <p>Modeled wet &amp; dry utilities and ICT networks, prepared layouts, long sections, schedules &amp; profiles, and managed pipe networks with catch basins, manholes and fire hydrants. Coordinated with design engineers, BIM leads and discipline contractors while guiding junior engineers.<\u002Fp>\n        <div class=\"badges\"><span class=\"badge\">Pipe Networks<\u002Fspan><span class=\"badge\">Wet &amp; Dry Utilities<\u002Fspan><span class=\"badge\">ICT Networks<\u002Fspan><span class=\"badge\">Civil 3D<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item reveal left\">\n      <div class=\"job\">\n        <div class=\"job-head\"><h3>Senior Technical Office Engineer<\u002Fh3><span class=\"when\">Apr 2023 — Apr 2024<\u002Fspan><\u002Fdiv>\n        <div class=\"co\">Hassan Allam Construction<\u002Fdiv>\n        <div class=\"loc\">Cairo, Egypt · 3000 Feddan HA &amp; OC JV (Water · Sewage · Roads)<\u002Fdiv>\n        <p>Prepared shop &amp; coordination drawings from project designs, managed submittals and resolved inter-discipline conflicts, handled RFIs and variation orders, and computed subcontractor &amp; client invoices while monitoring project budgets against scope.<\u002Fp>\n        <div class=\"badges\"><span class=\"badge\">Shop Drawings<\u002Fspan><span class=\"badge\">BOQ<\u002Fspan><span class=\"badge\">RFIs<\u002Fspan><span class=\"badge\">Budgeting<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item reveal left\">\n      <div class=\"job\">\n        <div class=\"job-head\"><h3>Technical Office Engineer<\u002Fh3><span class=\"when\">May 2021 — Apr 2023<\u002Fspan><\u002Fdiv>\n        <div class=\"co\">Hassan Allam Construction<\u002Fdiv>\n        <div class=\"loc\">Cairo, Egypt · 3000 Feddan HA &amp; OC JV (Water · Sewage · Roads)<\u002Fdiv>\n        <p>Supported infrastructure construction of water, sewage &amp; road networks — preparing coordination drawings, reviewing subcontractor submittals and tracking technical documentation through consultant approvals.<\u002Fp>\n        <div class=\"badges\"><span class=\"badge\">Infrastructure<\u002Fspan><span class=\"badge\">Coordination<\u002Fspan><span class=\"badge\">Roads<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item reveal left\">\n      <div class=\"job\">\n        <div class=\"job-head\"><h3>Site Engineer (Construction)<\u002Fh3><span class=\"when\">Jun 2020 — May 2021<\u002Fspan><\u002Fdiv>\n        <div class=\"co\">7 Seas<\u002Fdiv>\n        <div class=\"loc\">Cairo, Egypt · Karma Beach Resort — South Sinai<\u002Fdiv>\n        <p>Managed and supervised construction work packages, coordinated subcontractors for timely execution, inspected and reported procured items, and ran inventory &amp; storage arrangement across concrete, landscape and finishing works.<\u002Fp>\n        <div class=\"badges\"><span class=\"badge\">Concrete Works<\u002Fspan><span class=\"badge\">Landscape<\u002Fspan><span class=\"badge\">Finishes<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"marquee\" style=\"margin-top:46px\">\n    <div class=\"marquee-track\">\n      <span>Smart Engineering Consultancy<\u002Fspan><span>Hassan Allam Construction<\u002Fspan><span>El-Dafe Contracting<\u002Fspan><span>Red Sea Global<\u002Fspan><span>7 Seas<\u002Fspan><span>VINCI Construction<\u002Fspan><span>Orascom Construction<\u002Fspan><span>Arab Contractors<\u002Fspan><span>NEOM<\u002Fspan><span>Qiddiya<\u002Fspan>\n      <span>Smart Engineering Consultancy<\u002Fspan><span>Hassan Allam Construction<\u002Fspan><span>El-Dafe Contracting<\u002Fspan><span>Red Sea Global<\u002Fspan><span>7 Seas<\u002Fspan><span>VINCI Construction<\u002Fspan><span>Orascom Construction<\u002Fspan><span>Arab Contractors<\u002Fspan><span>NEOM<\u002Fspan><span>Qiddiya<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- tools -->\n<section id=\"tools\">\n  <div class=\"eyebrow reveal\">Proprietary Software<\u002Fdiv>\n  <h2 class=\"sec-title reveal\" data-delay=\"1\">Tools &amp; Automation<\u002Fh2>\n  <p class=\"sec-sub reveal\" data-delay=\"2\">Custom C#/.NET 8 plugins and AI workflows I engineered to replace days of manual BIM work with repeatable, parametric pipelines.<\u002Fp>\n  <div class=\"tools-grid\">\n    <div class=\"proj reveal\"><span class=\"emoji\">🧩<\u002Fspan><h3>ClashDash <span style=\"font-size:13px;color:var(--cyan);font-weight:700\">v2<\u002Fspan><\u002Fh3><div class=\"where\">Civil 3D Plugin · C# · .NET 8 · WPF<\u002Fdiv><p>Integrates Navisworks XML clash reports directly into the Civil 3D environment through a custom UI — letting designers triage and resolve clashes without ever leaving the engineering model.<\u002Fp><div class=\"tags\"><span>C#<\u002Fspan><span>.NET 8<\u002Fspan><span>WPF<\u002Fspan><span>Navisworks<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div class=\"proj reveal\" data-delay=\"1\"><span class=\"emoji\">⚙️<\u002Fspan><h3>PortForge<\u002Fh3><div class=\"where\">Pressure-Network Catalog Automation · C# · Civil 3D API<\u002Fdiv><p>Automates Civil 3D pressure-network catalog creation directly from raw DWG files, replacing days of manual Inventor / Infrastructure Parts Editor work with a repeatable, parametric pipeline.<\u002Fp><div class=\"tags\"><span>C#<\u002Fspan><span>.NET 8<\u002Fspan><span>Civil 3D API<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div class=\"proj reveal\" data-delay=\"1\"><span class=\"emoji\">🛟<\u002Fspan><h3>DrawingRescue.dll<\u002Fh3><div class=\"where\">Drawing-Database Recovery Library · C# · .NET<\u002Fdiv><p>Standalone library that repairs corrupted DWG drawing databases — recovering otherwise-unopenable files and protecting critical project deliverables.<\u002Fp><div class=\"tags\"><span>C#<\u002Fspan><span>.NET<\u002Fspan><span>DWG Recovery<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div class=\"proj reveal\" data-delay=\"2\"><span class=\"emoji\">🤖<\u002Fspan><h3>AI Orchestration Stack<\u002Fh3><div class=\"where\">Multi-Agent Engineering Workflows<\u002Fdiv><p>Runs multi-agent AI workflows — Claude Code for high-level planning and Antigravity CLI for strict automated execution &amp; project-context management — applied to plugin development and BIM automation.<\u002Fp><div class=\"tags\"><span>Claude Code<\u002Fspan><span>Antigravity CLI<\u002Fspan><span>Multi-Agent<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- projects -->\n<section id=\"projects\">\n  <div class=\"eyebrow reveal\">Selected Work<\u002Fdiv>\n  <h2 class=\"sec-title reveal\" data-delay=\"1\">Projects<\u002Fh2>\n  <p class=\"sec-sub reveal\" data-delay=\"2\">Mega-scale infrastructure across the region — modeled, coordinated and delivered.<\u002Fp>\n  <div class=\"proj-grid\">\n    <div class=\"proj reveal\"><span class=\"emoji\">🌳<\u002Fspan><h3>King Abdel-Aziz Park<\u002Fh3><div class=\"where\">Riyadh · KSA<\u002Fdiv><p>Wet utilities BIM modeling &amp; coordination for one of Riyadh's flagship urban park developments.<\u002Fp><div class=\"tags\"><span>SewerGEMS<\u002Fspan><span>WaterGEMS<\u002Fspan><span>Civil 3D<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div class=\"proj reveal\" data-delay=\"1\"><span class=\"emoji\">🎢<\u002Fspan><h3>Qiddiya City<\u002Fh3><div class=\"where\">Riyadh · KSA<\u002Fdiv><p>Infrastructure BIM er.gumroad.com/\" target=\"_blank\" rel=\"noopener\" class=\"crow reveal\" data-delay=\"5\"><div class=\"cico\">🛒<\u002Fdiv><div><small>Gumroad<\u002Fsmall><b>mawengineer.gumroad.com<\u002Fb><\u002Fdiv><\u002Fa>\n      <a href=\"https://drive.google.com/file/d/15NqYBNMywG6jDcqvsbFDw_AWxRt00oR0/view\" target=\"_blank\" rel=\"noopener\" class=\"crow reveal\" data-delay=\"5\"><div class=\"cico\">📄<\u002Fdiv><div><small>Curriculum Vitae<\u002Fsmall><b>View full CV (PDF)<\u002Fb><\u002Fdiv><\u002Fa>\n      <a href=\"https://abo-eyad.github.io/portfolio/\" target=\"_blank\" rel=\"noopener\" class=\"crow reveal\" data-delay=\"5\"><div class=\"cico\">🌐<\u002Fdiv><div><small>Portfolio<\u002Fsmall><b>abo-eyad.github.io/portfolio<\u002Fb><\u002Fdiv><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"pulse-wrap reveal right\">\n      <div class=\"ripple\"><\u002Fdiv><div class=\"ripple\"><\u002Fdiv><div class=\"ripple\"><\u002Fdiv>\n      <div class=\"pulse-av\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdiv>\n\n<footer>Designed &amp; engineered with precision — <span>Ahmed Wahab<\u002Fspan> · © 2026<\u002Ffooter>\n\n<script>\n/* ---------- loader ---------- */\n/* ---------- email (assembled at runtime to avoid scanner obfuscation) ---------- */\n(function(){\n  var user=['Eng','ahmed','maw'].join('.');\n  var addr=user+String.fromCharCode(64)+'gmail'+'.'+'com';\n  var link=document.getElementById('emailLink'),txt=document.getElementById('emailText');\n  if(link&&txt){txt.textContent=addr;link.setAttribute('href','mail'+'to:'+addr);}\n})();\n\nwindow.addEventListener('load',()=>{\n  setTimeout(()=>document.getElementById('loader').classList.add('done'),2000);\n});\n\n/* ---------- custom cursor ---------- */\n(function(){\n  const dot=document.querySelector('.cur-dot'),ring=document.querySelector('.cur-ring');\n  if(!dot)return;\n  let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;\n  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});\n  (function loop(){rx+=(mx-rx)*0.18;ry+=(my-ry)*0.18;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();\n  document.addEventListener('mouseover',e=>{\n    if(e.target.closest('a,button,.chip,.proj,.job,.btn,.nav-links a')) ring.classList.add('hover');\n  });\n  document.addEventListener('mouseout',e=>{\n    if(e.target.closest('a,button,.chip,.proj,.job,.btn,.nav-links a')) ring.classList.remove('hover');\n  });\n})();\n\n/* ---------- particle network ---------- */\n(function(){\n  const cv=document.getElementById('particles'),ctx=cv.getContext('2d');\n  const colors=['#4f7cff','#5b6ee0','#28b8a6','#c9a45c'];\n  let w,h,parts=[];\n  function size(){w=cv.width=innerWidth;h=cv.height=innerHeight;init();}\n  function init(){\n    const n=Math.min(90,Math.floor(w*h/16000));\n    parts=Array.from({length:n},()=>({\n      x:Math.random()*w,y:Math.random()*h,\n      vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,\n      r:Math.random()*2+1,c:colors[Math.floor(Math.random()*colors.length)]\n    }));\n  }\n  function draw(){\n    ctx.clearRect(0,0,w,h);\n    for(let i=0;i<parts.length;i++){\n      const p=parts[i];\n      p.x+=p.vx;p.y+=p.vy;\n      if(p.x<0||p.x>w)p.vx*=-1;\n      if(p.y<0||p.y>h)p.vy*=-1;\n      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fillStyle=p.c;ctx.globalAlpha=.9;ctx.fill();\n      for(let j=i+1;j<parts.length;j++){\n        const q=parts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.hypot(dx,dy);\n        if(d<130){\n          ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);\n          ctx.strokeStyle=p.c;ctx.globalAlpha=(1-d/130)*.22;ctx.lineWidth=1;ctx.stroke();\n        }\n      }\n    }\n    ctx.globalAlpha=1;\n    requestAnimationFrame(draw);\n  }\n  addEventListener('resize',size);size();draw();\n})();\n\n/* ---------- mobile nav ---------- */\n(function(){\n  const b=document.getElementById('burger'),l=document.getElementById('navlinks');\n  b.addEventListener('click',()=>{b.classList.toggle('open');l.classList.toggle('open');});\n  l.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{b.classList.remove('open');l.classList.remove('open');}));\n})();\n\n/* ---------- scroll reveal + skill bars ---------- */\n(function(){\n  const io=new IntersectionObserver((entries)=>{\n    entries.forEach(en=>{\n      if(en.isIntersecting){\n        en.target.classList.add('in');\n        if(en.target.id==='skillsGrid'||en.target.classList.contains('skills-grid')){\n          en.target.querySelectorAll('.bar i').forEach(bar=>{\n            bar.style.width=bar.dataset.w+'%';\n            bar.parentElement.classList.add('filled');\n          });\n        }\n        io.unobserve(en.target);\n      }\n    });\n  },{threshold:.18});\n  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));\n  const sg=document.getElementById('skillsGrid');if(sg)io.observe(sg);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
